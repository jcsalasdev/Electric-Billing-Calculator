<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apartment Billing System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fa; }

    .card { border-radius: 12px; }

    .result-card {
      border-left: 5px solid #198754;
    }

    .rate-value::after {
      content: "";
      display: block;
      width: 70px;
      height: 2px;
      background: #000;
      margin-left: auto;
      margin-top: 4px;
    }

    .is-invalid {
      border: 2px solid #dc3545 !important;
    }

    .is-valid {
      border: 2px solid #198754 !important;
    }

    @media print {
      body * { visibility: hidden; }
    
      #results, #results * {
        visibility: visible;
      }
      
      #results {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
    
      .result-card {
        page-break-after: always;
      }
    
       .rate-value::after {
        content: "";
        display: block;
        width: 70px;
        height: 2px;
        background: #000;
        margin-left: auto;
        margin-top: 4px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      } 
    }
  </style>
</head>

<body>

<div class="container py-4">

  <h3 class="text-center mb-3">⚡💧 Apartment Billing System</h3>

  <!-- SETTINGS -->
  <div class="card p-3 mb-3 shadow-sm">
    <h5>Billing Settings</h5>

    <div class="row g-2">
      <div class="col-4">
        <label class="form-label">Billing Month</label>
        <input type="month" id="billingMonth" class="form-control">
      </div>

      <div class="col-2">
        <label class="form-label">Electric Rate per kWh</label>
        <input type="number" id="rate" class="form-control" value="15.6">
      </div>

      <div class="col-2">
        <label class="form-label">Service Fee (Electric)</label>
        <input type="number" id="serviceFee" class="form-control" value="2">
      </div>

      <div class="col-2">
        <label class="form-label">Water Rate per m³</label>
        <input type="number" id="waterRate" class="form-control" value="31">
      </div>
    </div>
  </div>

  <!-- TENANTS -->
  <div id="tenants"></div>

  <div class="row g-2 mb-3">
    <div class="col-12 col-md-4">
      <button class="btn btn-outline-primary w-100" onclick="addTenant()">
        + Add Tenant
      </button>
    </div>

    <div class="col-12 col-md-4">
      <button class="btn btn-primary w-100" onclick="calculate()">
        Calculate Bills
      </button>
    </div>

    <div class="col-12 col-md-4">
      <button id="printBtn" class="btn btn-secondary w-100" onclick="tryPrint()" disabled>
        🖨️ Print Bills
      </button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>

</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="errorToast" class="toast text-bg-danger" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        Cannot print due to errors. Please fix invalid inputs first.
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function addTenant() {
  const div = document.createElement("div");
  div.className = "card p-3 mb-3 shadow-sm";

  div.innerHTML = `
    <div class="row g-2">
      <div class="col-12 mb-1">
        <strong>👤 Tenant<strong>
      </div>
      <div class="col-12 mb-2">
        <input class="form-control" placeholder="e.g. Unit 3B - Juan Dela Cruz">
      </div>

      <!-- Electric Section -->
      <div class="col-12 mb-1">
        <strong>⚡ Electric Readings</strong>
      </div>
      <div class="row">
        <div class="col-12 col-md-6">
          <input type="number" class="form-control" placeholder="Previous Electric Reading">
        </div>
        <div class="col-12 col-md-6">
          <input type="number" class="form-control" placeholder="Current Electric Reading">
        </div>
      </div>
      <!-- Water Section -->
      <div class="col-12 mt-2 mb-1">
        <strong>💧 Water Readings</strong>
      </div>
     <div class="row">
        <div class="col-12 col-md-6">
          <input type="number" class="form-control" placeholder="Previous Water Reading">
        </div>
        <div class="col-12 col-md-6">
          <input type="number" class="form-control" placeholder="Current Water Reading">
        </div>
      </div>
    </div>
  `;

  document.getElementById("tenants").appendChild(div);
}

/* SET CURRENT MONTH DEFAULT */
document.addEventListener("DOMContentLoaded", function () {
  const monthInput = document.getElementById("billingMonth");
  const now = new Date();
  monthInput.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
});

/* REAL-TIME VALIDATION */
document.addEventListener("input", function (e) {
  if (e.target.tagName !== "INPUT") return;

  /* SERVICE FEE VALIDATION ONLY */
  if (e.target.id === "serviceFee") {
    const val = parseFloat(e.target.value);
    e.target.classList.remove("is-invalid","is-valid");
    if (e.target.value==="" || isNaN(val) || val<0) e.target.classList.add("is-invalid");
    else e.target.classList.add("is-valid");
    return;
  }

  /* IGNORE SETTINGS */
  if (["rate","billingMonth","waterRate"].includes(e.target.id)) {
    e.target.classList.remove("is-invalid","is-valid");
    return;
  }

  /* TENANT VALIDATION */
  const card = e.target.closest("#tenants .card");
  if(!card) return;
  const inputs = card.querySelectorAll("input");

  const [name, prevE, currE, prevW, currW] = inputs;
  [name, prevE, currE, prevW, currW].forEach(i=>i.classList.remove("is-invalid","is-valid"));

  const prevEVal=parseFloat(prevE.value), currEVal=parseFloat(currE.value);
  const prevWVal=parseFloat(prevW.value), currWVal=parseFloat(currW.value);

  if(!name.value.trim()) name.classList.add("is-invalid"); else name.classList.add("is-valid");

  if(isNaN(prevEVal) || isNaN(currEVal) || prevE.value==="" || currE.value==="") prevE.classList.add("is-invalid"), currE.classList.add("is-invalid");
  else if(currEVal<prevEVal) currE.classList.add("is-invalid"); else prevE.classList.add("is-valid"), currE.classList.add("is-valid");

  if(isNaN(prevWVal) || isNaN(currWVal) || prevW.value==="" || currW.value==="") prevW.classList.add("is-invalid"), currW.classList.add("is-invalid");
  else if(currWVal<prevWVal) currW.classList.add("is-invalid"); else prevW.classList.add("is-valid"), currW.classList.add("is-valid");
});

/* CALCULATE */
function calculate() {
  const rate=parseFloat(document.getElementById("rate").value);
  const serviceFee=parseFloat(document.getElementById("serviceFee").value);
  const waterRate=parseFloat(document.getElementById("waterRate").value);
  const billingMonth=document.getElementById("billingMonth").value;
  const tenants=document.querySelectorAll("#tenants .card");
  let output="", hasError=false;
  const printBtn=document.getElementById("printBtn");
  const resultDiv=document.getElementById("results");
  resultDiv.innerHTML="";

  if(!billingMonth) { resultDiv.innerHTML=`<div class="alert alert-danger">Billing month is required.</div>`; printBtn.disabled=true; return; }
  if(isNaN(rate)||rate<=0){ resultDiv.innerHTML=`<div class="alert alert-danger">Electric rate must be greater than 0.</div>`; printBtn.disabled=true; return; }
  if(isNaN(serviceFee)||serviceFee<0){ resultDiv.innerHTML=`<div class="alert alert-danger">Service fee must be 0 or higher.</div>`; printBtn.disabled=true; return; }
  if(isNaN(waterRate)||waterRate<0){ resultDiv.innerHTML=`<div class="alert alert-danger">Water rate must be 0 or higher.</div>`; printBtn.disabled=true; return; }
  if(tenants.length===0){ resultDiv.innerHTML=`<div class="alert alert-warning">No tenants added.</div>`; printBtn.disabled=true; return; }

  tenants.forEach((card,index)=>{
    const inputs=card.querySelectorAll("input");
    const [name, prevE, currE, prevW, currW]=inputs;
    const prevEVal=parseFloat(prevE.value), currEVal=parseFloat(currE.value);
    const prevWVal=parseFloat(prevW.value), currWVal=parseFloat(currW.value);

    let errors=[];
    if(!name.value.trim()) errors.push("Tenant name is required.");
    if(isNaN(prevEVal)||isNaN(currEVal)) errors.push("Electric readings must be valid numbers.");
    if(!isNaN(prevEVal)&&!isNaN(currEVal)&&currEVal<prevEVal) errors.push("Current electric reading cannot be lower than previous reading.");
    if(isNaN(prevWVal)||isNaN(currWVal)) errors.push("Water readings must be valid numbers.");
    if(!isNaN(prevWVal)&&!isNaN(currWVal)&&currWVal<prevWVal) errors.push("Current water reading cannot be lower than previous reading.");

    if(errors.length>0){ hasError=true;
      output+=`<div class="alert alert-danger"><strong>Tenant #${index+1} Error</strong><ul class="mb-0">${errors.map(e=>`<li>${e}</li>`).join("")}</ul></div>`;
      return;
    }

    let usageE=currEVal-prevEVal;
    let electricityCost=usageE*rate;
    let totalServiceFee=usageE*serviceFee;
    let totalE=electricityCost+totalServiceFee;

    let usageW=currWVal-prevWVal;
    let waterCost=usageW*waterRate;

    output+=`
      <div class="card result-card p-3 mb-3">
        <div class="text-center mb-2 fw-bold">Billing Month: ${billingMonth}</div>
        <h6 class="mb-2 text-uppercase">${name.value.trim()}</h6>

        <div class="row">
          <div class="col-6">Electric Usage</div>
          <div class="col-6 text-end">${usageE} kWh</div>

          <div class="col-6">Electric Rate</div>
          <div class="col-6 text-end rate-value">₱${rate}</div>

          <div class="col-6">Electricity Cost</div>
          <div class="col-6 text-end">₱${electricityCost.toFixed(2)}</div>

          <div class="col-6">Service Fee</div>
          <div class="col-6 text-end rate-value">₱${totalServiceFee.toFixed(2)}</div>

          <div class="col-6 fw-bold">Electric Bill</div>
          <div class="col-6 text-end fw-bold rate-value">₱${totalE.toFixed(2)}</div>

          <div class="col-6">Water Usage</div>
          <div class="col-6 text-end">${usageW} m³</div>

          <div class="col-6">Water Rate</div>
          <div class="col-6 text-end rate-value">₱${waterRate}</div>

          <div class="col-6 fw-bold">Water Bill</div>
          <div class="col-6 text-end fw-bold rate-value">₱${waterCost.toFixed(2)}</div>

          <div class="col-6 fw-bold">Total Bill</div>
          <div class="col-6 text-end fw-bold">₱${(totalE+waterCost).toFixed(2)}</div>
        </div>
      </div>
    `;
  });

  resultDiv.innerHTML=output;
  printBtn.disabled=hasError;
}

/* PRINT */
function tryPrint() {
  const invalid = document.querySelectorAll(".is-invalid").length > 0;
  if (invalid) { 
    new bootstrap.Toast(document.getElementById("errorToast")).show();
    return;
  }
  window.print();
}
</script>

</body>
</html>
