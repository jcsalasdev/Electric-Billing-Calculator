<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electric Billing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }
    .card {
      border-radius: 12px;
    }
    .result-card {
      background: #ffffff;
      border-left: 5px solid #0d6efd;
    }
  </style>
</head>
<body>

<div class="container py-4">

  <h3 class="mb-3 text-center">⚡ Electric Billing Calculator</h3>

  <!-- Settings -->
  <div class="card p-3 mb-3 shadow-sm">
    <h5>Billing Settings</h5>

    <div class="row">
      <div class="col-6">
        <label class="form-label">Rate per kWh</label>
        <input type="number" id="rate" class="form-control" value="12">
      </div>

      <div class="col-6">
        <label class="form-label">Service Fee</label>
        <input type="number" id="serviceFee" class="form-control" value="0">
      </div>
    </div>
  </div>

  <!-- Tenant List -->
  <div id="tenants"></div>

  <div class="d-grid gap-2 mb-3">
    <button class="btn btn-outline-primary" onclick="addTenant()">+ Add Tenant</button>
    <button class="btn btn-primary" onclick="calculate()">Calculate Bills</button>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <div class="d-grid mt-3">
    <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
  </div>

</div>

<script>
function addTenant() {
  const div = document.createElement("div");
  div.className = "card p-3 mb-3 shadow-sm";

  div.innerHTML = `
    <div class="row g-2">

      <div class="col-12">
        <input class="form-control" 
          placeholder="e.g. Unit 3B - Juan Dela Cruz">
      </div>

      <div class="col-6">
        <input type="number" class="form-control" 
          placeholder="Prev: 12450 kWh">
      </div>

      <div class="col-6">
        <input type="number" class="form-control" 
          placeholder="Current: 12680 kWh">
      </div>

    </div>
  `;

  document.getElementById("tenants").appendChild(div);
}

function calculate() {
  const rate = parseFloat(document.getElementById("rate").value) || 0;
  const serviceFee = parseFloat(document.getElementById("serviceFee").value) || 0;

  const tenants = document.querySelectorAll("#tenants .card");
  let output = "";

  tenants.forEach(card => {
    const inputs = card.querySelectorAll("input");

    const name = inputs[0].value || "Unnamed Unit";
    const prev = parseFloat(inputs[1].value) || 0;
    const curr = parseFloat(inputs[2].value) || 0;

    const kwh = Math.max(curr - prev, 0);
    const subtotal = kwh * rate;
    const total = subtotal + serviceFee;

    output += `
      <div class="card result-card p-3 mb-2 shadow-sm">
        <h6 class="mb-2">${name}</h6>
        <div class="row">
          <div class="col-6">Usage:</div>
          <div class="col-6 text-end">${kwh} kWh</div>

          <div class="col-6">Rate:</div>
          <div class="col-6 text-end">₱${rate}</div>

          <div class="col-6">Subtotal:</div>
          <div class="col-6 text-end">₱${subtotal.toFixed(2)}</div>

          <div class="col-6">Service Fee:</div>
          <div class="col-6 text-end">₱${serviceFee.toFixed(2)}</div>

          <div class="col-6 fw-bold">Total:</div>
          <div class="col-6 text-end fw-bold">₱${total.toFixed(2)}</div>
        </div>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
